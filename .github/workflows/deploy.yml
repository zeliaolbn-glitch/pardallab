name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Define deployment variables
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USER: ${{ secrets.HOSTINGER_USER }}
          PORT: ${{ secrets.HOSTINGER_PORT }}
          APP_DIR: ${{ secrets.HOSTINGER_APP_DIR }}
        run: |
          echo "HOST=$HOST" >> $GITHUB_ENV
          echo "USER=$USER" >> $GITHUB_ENV
          echo "PORT=$PORT" >> $GITHUB_ENV
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      - name: Execute remote deploy script
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ env.PORT }} ${{ env.USER }}@${{ env.HOST }} "export PATH=/opt/alt/alt-nodejs22/root/bin:/bin:/usr/bin:/usr/local/bin:\$PATH; \
            set -e; \
            cd \"${{ env.APP_DIR }}\"; \
            git fetch origin; \
            git reset --hard origin/main; \
            npm ci; \
            npm run build; \
            rm -rf ../nodejs/public/*; \
            cp -r dist/* ../nodejs/public/; \
            cp backend_hostinger/server.js ../nodejs/app.js; \
            cp backend_hostinger/package.json ../nodejs/package.json; \
            cd ../nodejs; \
            npm install --omit=dev; \
            mkdir -p tmp; \
            touch tmp/restart.txt"
